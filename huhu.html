<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Event Dashboard</title>

<style>
    * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        margin: 0;
        padding: 20px;
        background: linear-gradient(135deg, #47c5d8, #5dd6c7);
    }

    h1 {
        text-align: center;
        color: white;
        margin-bottom: 20px;
    }

    .main {
        max-width: 1100px;
        margin: auto;
        display: flex;
        gap: 20px;
    }

    .card {
        background: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    .add-event {
        width: 30%;
    }

    .events {
        width: 70%;
    }

    label {
        font-weight: bold;
        font-size: 14px;
    }

    input, select, textarea, button {
        width: 100%;
        padding: 8px;
        margin: 6px 0 12px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        background: #3bb7c6;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #2ea5b3;
    }

    .top-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
    }

    #eventList {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }

    .event-card {
        width: 260px;
        background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        border-radius: 12px;
        padding: 15px;
        position: relative;
        box-shadow: 0 5px 10px rgba(0,0,0,0.15);
    }

    .event-card h4 {
        margin: 0 0 5px 0;
        font-size: 18px;
    }

    .date {
        font-size: 13px;
        margin-bottom: 5px;
    }

    .category {
        display: inline-block;
        background: #6c63ff;
        color: white;
        padding: 4px 10px;
        border-radius: 15px;
        font-size: 12px;
        margin-bottom: 8px;
    }

    .desc {
        font-size: 13px;
        margin-top: 8px;
        word-wrap: break-word;
    }

    .delete-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: none;
        background: #ff4d4d;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    .dom-demo {
        max-width: 1100px;
        margin: 20px auto 0;
        background: white;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }
</style>
</head>

<body>

<h1>🎯 Smart Event Dashboard</h1>

<div class="main">

    <!-- Add Event -->
    <div class="card add-event">
        <h3>Add New Event</h3>

        <label>Event Title</label>
        <input type="text" id="title">

        <label>Event Date</label>
        <input type="date" id="date">

        <label>Category</label>
        <select id="category">
            <option>Conference</option>
            <option>Workshop</option>
            <option>Seminar</option>
            <option>Meetup</option>
        </select>

        <label>Description</label>
        <textarea id="desc"></textarea>

        <button id="addEvent">Add Event</button>
    </div>

    <!-- Events -->
    <div class="card events">
        <h3>My Events</h3>

        <div class="top-buttons">
            <button id="clearAll">Clear All Events</button>
            <button id="addSample">Add Sample Events</button>
        </div>

        <div id="eventList">
            <p id="emptyText">No events yet. Add your first event!</p>
        </div>
    </div>

</div>

<!-- DOM Demo -->
<div class="dom-demo">
    <h3>DOM Manipulation Demo</h3>
    <p id="keyText">Press any key...</p>
</div>

<script>
    const titleInput = document.getElementById("title");
    const dateInput = document.getElementById("date");
    const categoryInput = document.getElementById("category");
    const descInput = document.getElementById("desc");
    const addBtn = document.getElementById("addEvent");
    const eventList = document.getElementById("eventList");
    const clearBtn = document.getElementById("clearAll");
    const sampleBtn = document.getElementById("addSample");
    const keyText = document.getElementById("keyText");

    function removeEmptyText() {
        const empty = document.getElementById("emptyText");
        if (empty) empty.remove();
    }

    function createEvent(title, date, category, desc) {
        removeEmptyText();

        const card = document.createElement("div");
        card.className = "event-card";

        card.innerHTML = `
            <button class="delete-btn">×</button>
            <h4>${title}</h4>
            <div class="date">📅 ${date}</div>
            <div class="category">${category}</div>
            <div class="desc">${desc}</div>
        `;

        eventList.appendChild(card);
    }

    addBtn.addEventListener("click", () => {
        if (!titleInput.value || !dateInput.value) {
            alert("Please fill required fields");
            return;
        }

        createEvent(
            titleInput.value,
            dateInput.value,
            categoryInput.value,
            descInput.value
        );

        titleInput.value = "";
        dateInput.value = "";
        descInput.value = "";
    });

    eventList.addEventListener("click", (e) => {
        if (e.target.classList.contains("delete-btn")) {
            e.target.parentElement.remove();

            if (eventList.children.length === 0) {
                eventList.innerHTML = `<p id="emptyText">No events yet. Add your first event!</p>`;
            }
        }
    });

    clearBtn.addEventListener("click", () => {
        eventList.innerHTML = `<p id="emptyText">No events yet. Add your first event!</p>`;
    });

    sampleBtn.addEventListener("click", () => {
        createEvent("HTML", "2026-02-18", "Workshop", "Markup Language");
        createEvent("JavaScript", "2026-02-20", "Seminar", "DOM Manipulation Basics");
    });

    document.addEventListener("keydown", (e) => {
        keyText.textContent = "You pressed: " + e.key;
        keyText.style.color = "#3bb7c6";
    });
</script>

</body>
</html>
